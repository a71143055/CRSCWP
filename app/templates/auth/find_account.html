{% extends "base.html" %}

{% block content %}
<div class="grid">
  <div></div>
  <div>
    <article>
        <h3>아이디 / 비밀번호 확인</h3>
        <p>등록하신 이메일 주소를 입력하시면 계정 존재 여부를 확인해 드립니다.</p>
        <form method="POST">
            <input type="email" name="email" placeholder="이메일 입력" required>
            <button type="submit">계정 확인</button>
        </form>
        <div style="margin-top: 1rem; text-align: center;">
            <a href="{{ url_for('auth.login') }}"><small>로그인으로 돌아가기</small></a>
        </div>
    </article>
  </div>
  <div></div>
</div>
{% endblock %}
