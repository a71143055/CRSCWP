{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <article>
        <h2 style="text-align: center; margin-bottom: 2rem;">Login</h2>
        <form method="POST" action="{{ url_for('auth.login_post') }}">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="••••••••" required>
            </div>
            <div style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
                <input type="checkbox" id="remember" name="remember" style="width: auto; margin-bottom: 0;">
                <label for="remember" style="margin-bottom: 0; font-weight: 400;">Remember me</label>
            </div>
            <button type="submit">Sign In</button>
        </form>
        <div style="margin-top: 2rem; text-align: center;">
            <a href="{{ url_for('auth.find_account') }}" style="font-size: 0.85rem; color: var(--text-muted);">Forgot account?</a>
        </div>
    </article>
</div>
{% endblock %}
