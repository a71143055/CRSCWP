{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <article>
        <h2 style="text-align: center; margin-bottom: 2rem;">Join CRSCWP</h2>
        <form method="POST" action="{{ url_for('auth.signup_post') }}">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" name="name" id="name" placeholder="Your full name" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit">Create Account</button>
        </form>
        <div style="margin-top: 2rem; text-align: center;">
            <p style="font-size: 0.85rem; color: var(--text-muted);">
                Already have an account? <a href="{{ url_for('auth.login') }}" style="color: var(--accent); font-weight: 600;">Sign in</a>
            </p>
        </div>
    </article>
</div>
{% endblock %}
